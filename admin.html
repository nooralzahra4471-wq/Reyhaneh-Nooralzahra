<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
ریحانة نورالزهرا | مدیریت
</title>


<link rel="stylesheet" href="admin.css">

</head>


<body>


<div class="admin-container">


<header class="top-header">

<div class="brand">

<h1>
ریحانة نورالزهرا
</h1>

<span>
پنل مدیریت فروشگاه
</span>

</div>


<button 
id="logoutBtn"
class="btn danger">

خروج

</button>


</header>





<aside class="sidebar">


<div class="admin-profile">


<div class="avatar">
ن
</div>


<h3>
مدیر سیستم
</h3>


</div>




<ul>


<li>
<button 
class="nav-btn active"
data-section="dashboard">

داشبورد

</button>
</li>


<li>
<button 
class="nav-btn"
data-section="products">

محصولات

</button>
</li>


<li>
<button 
class="nav-btn"
data-section="orders">

سفارش‌ها

</button>
</li>


<li>
<button 
class="nav-btn"
data-section="partners">

همکاران

</button>
</li>


<li>
<button 
class="nav-btn"
data-section="settings">

تنظیمات

</button>
</li>


</ul>


</aside>




<main class="main-content">


<section 
id="dashboard"
class="section active">


<h2>
داشبورد مدیریت
</h2>


<div class="stats">


<div class="stat-card">

<h3>
محصولات
</h3>

<strong id="totalProducts">
0
</strong>

</div>



<div class="stat-card">

<h3>
سفارش‌ها
</h3>

<strong id="totalOrders">
0
</strong>

</div>



<div class="stat-card">

<h3>
همکاران
</h3>

<strong id="totalPartners">
0
</strong>

</div>


</div>


</section>

<section id="products" class="section">


<h2>
مدیریت محصولات
</h2>



<div class="panel">


<form id="productForm">


<div class="form-group">

<label>
نام محصول
</label>


<input
type="text"
id="productName"
required
placeholder="نام محصول">


</div>




<div class="form-group">

<label>
دسته‌بندی
</label>


<select id="productCategory">


<option value="بلوریجات">
بلوریجات
</option>


<option value="چاپ اختصاصی">
چاپ اختصاصی
</option>


<option value="هدیه">
هدیه
</option>


<option value="سایر">
سایر
</option>


</select>


</div>





<div class="form-group">

<label>
قیمت فروش
</label>


<input
type="number"
id="productPrice"
placeholder="قیمت فروش">


</div>





<div class="form-group">

<label>
قیمت همکاری
</label>


<input
type="number"
id="partnerPrice"
placeholder="قیمت همکاری">


</div>





<div class="form-group">

<label>
تصویر محصول
</label>


<input
type="file"
id="productImage"
accept="image/*">


</div>





<div class="form-group">

<label>
توضیحات
</label>


<textarea
id="productDescription"
placeholder="توضیحات محصول">

</textarea>


</div>




<button
type="submit"
class="btn primary">

ثبت محصول

</button>



</form>


</div>








<div class="panel">


<h3>
لیست محصولات
</h3>



<table class="data-table">


<thead>


<tr>

<th>
تصویر
</th>


<th>
نام
</th>


<th>
دسته
</th>


<th>
قیمت
</th>


<th>
عملیات
</th>


</tr>


</thead>



<tbody id="productsTable">


</tbody>



</table>


</div>



</section>






<section id="orders" class="section">


<h2>
سفارش‌ها
</h2>



<div class="panel">


<table class="data-table">


<thead>


<tr>

<th>
شماره
</th>


<th>
مشتری
</th>


<th>
محصول
</th>


<th>
وضعیت
</th>


<th>
عملیات
</th>


</tr>


</thead>



<tbody id="ordersTable">


</tbody>



</table>


</div>



</section>

<section id="partners" class="section">


<h2>
مدیریت همکاران
</h2>



<div class="panel">


<table class="data-table">


<thead>


<tr>

<th>
نام همکار
</th>


<th>
وضعیت
</th>


<th>
عملیات
</th>


</tr>


</thead>



<tbody id="partnersTable">


</tbody>



</table>


</div>



</section>






<section id="settings" class="section">


<h2>
تنظیمات فروشگاه
</h2>



<div class="panel">


<div class="form-group">


<label>
نام فروشگاه
</label>


<input
id="shopName"
value="ریحانة نورالزهرا">


</div>





<div class="form-group">


<label>
شماره تماس
</label>


<input
id="shopPhone"
placeholder="شماره تماس">


</div>





<div class="form-group">


<label>
معرفی فروشگاه
</label>


<textarea
id="shopAbout">

</textarea>


</div>




<button
id="saveSettings"
class="btn primary">

ذخیره تنظیمات

</button>



</div>



</section>






</main>


</div>





<div
id="messageBox"
class="message">

</div>






<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>



<script src="firebase-config.js"></script>

<script src="admin.js"></script>



</body>

</html>
