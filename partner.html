<!DOCTYPE html>

<html lang="fa" dir="rtl">


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
پنل همکاران | ریحانة نورالزهرا
</title>



<link rel="stylesheet" href="admin.css">


</head>



<body>



<div class="admin-container">





<header class="top-header">


<div class="brand">


<h1>
ریحانة نورالزهرا
</h1>


<span>
پنل اختصاصی همکاران
</span>


</div>





<button
id="partnerLogout"
class="btn danger">


خروج


</button>



</header>








<aside class="sidebar">


<div class="admin-profile">


<div class="avatar">

هم

</div>



<h3>
همکار فروش
</h3>



</div>







<ul>


<li>

<button

class="nav-btn active"

data-section="partnerProducts">


محصولات همکاری


</button>


</li>




<li>

<button

class="nav-btn"

data-section="partnerOrders">


ثبت سفارش


</button>


</li>




</ul>


</aside>








<main class="main-content">






<section

id="partnerProducts"

class="section active">



<h2>
محصولات همکاری
</h2>






<div class="panel">



<table class="data-table">


<thead>


<tr>


<th>
تصویر
</th>


<th>
نام محصول
</th>


<th>
قیمت همکاری
</th>


<th>
انتخاب
</th>


</tr>


</thead>




<tbody id="partnerProductsTable">


</tbody>



</table>



</div>



</section>









<section

id="partnerOrders"

class="section">



<h2>
ثبت سفارش اختصاصی
</h2>





<div class="panel">



<form id="partnerOrderForm">





<div class="form-group">


<label>
نام محصول
</label>


<input

id="orderProduct"

placeholder="نام محصول">


</div>







<div class="form-group">


<label>
تعداد
</label>


<input

type="number"

id="orderCount"

placeholder="تعداد">


</div>







<div class="form-group">


<label>
توضیحات سفارش
</label>



<textarea

id="orderDescription">

</textarea>



</div>







<button

type="submit"

class="btn primary">


ثبت سفارش


</button>





</form>



</div>



</section>







</main>





</div>






<div

id="messageBox"

class="message">

</div>








<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>


<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>


<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>



<script src="firebase-config.js"></script>


<script src="partner.js"></script>




</body>


</html>
